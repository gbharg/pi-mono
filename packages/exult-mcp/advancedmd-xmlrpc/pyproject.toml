[project]
name = "exult-mcp-advancedmd-xmlrpc"
version = "0.1.0"
description = "Exult MCP server for AdvancedMD XMLRPC operations NOT covered by Keragon (service-account-scoped views)"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.2.0",
]

[project.scripts]
exult-mcp-advancedmd-xmlrpc = "server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
only-include = ["server.py"]
