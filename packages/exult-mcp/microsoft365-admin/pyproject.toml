[project]
name = "exult-mcp-microsoft365-admin"
version = "0.1.0"
description = "Exult MCP server for Microsoft 365 Graph app-only admin operations"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.2.0",
    "httpx>=0.27.0",
]

[project.scripts]
exult-mcp-microsoft365-admin = "server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
only-include = ["server.py"]
